<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hamoni: Cafe by the Greens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#C9A84C;--gold2:#E8A838;--black:#0A0A0A;--ivory:#F5F0E8}
html{scroll-behavior:auto}
body{background:var(--black);color:var(--ivory);font-family:'Space Grotesk',sans-serif;overflow-x:hidden}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:24px 48px}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;letter-spacing:.18em;color:var(--ivory);text-transform:uppercase;opacity:0;animation:fadeUp 1s .4s forwards}
.nav-links{display:flex;gap:36px;list-style:none;opacity:0;animation:fadeUp 1s .7s forwards}
.nav-links a{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--ivory);text-decoration:none;opacity:.65;transition:opacity .3s}
.nav-links a:hover{opacity:1}

/* HERO */
#hero{position:relative;height:700vh}
.hero-sticky{position:sticky;top:0;width:100%;height:100vh;overflow:hidden}
#c{position:absolute;inset:0;width:100%;height:100%;display:block}
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,.65) 100%);pointer-events:none}
.overlay{position:absolute;inset:0;pointer-events:none}

/* TEXT BLOCKS */
.tb{position:absolute;width:100%;text-align:center;opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease;pointer-events:none}
.tb.on{opacity:1;transform:translateY(0)}

#t1{top:50%;transform:translateY(calc(-50% + 24px))}
#t1.on{transform:translateY(-50%)}
#t1 h1{font-family:'Cormorant Garamond',serif;font-size:clamp(44px,7vw,100px);font-weight:300;font-style:italic;color:var(--ivory);line-height:1.08;letter-spacing:.02em;text-shadow:0 2px 40px rgba(0,0,0,.5)}

#t2{bottom:22%}
#t2 p{font-size:10px;letter-spacing:.38em;text-transform:uppercase;color:var(--gold)}

#t3{top:50%;transform:translateY(calc(-50% + 24px))}
#t3.on{transform:translateY(-50%)}
#t3 .b1{display:block;font-family:'Cormorant Garamond',serif;font-size:clamp(34px,5vw,78px);font-weight:300;color:var(--ivory);letter-spacing:.1em;text-transform:uppercase}
#t3 .b2{display:block;font-family:'Cormorant Garamond',serif;font-size:clamp(16px,2.4vw,34px);font-style:italic;color:var(--gold);margin-top:10px}

#t4{top:50%;transform:translateY(calc(-50% + 24px))}
#t4.on{transform:translateY(-50%);pointer-events:all}
.cta-sub{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:rgba(245,240,232,.45);margin-bottom:28px}
.cta-btn{display:inline-flex;align-items:center;gap:10px;padding:15px 40px;border:1px solid rgba(201,168,76,.4);background:rgba(201,168,76,.07);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);color:var(--gold);font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:.22em;text-transform:uppercase;text-decoration:none;border-radius:2px;transition:all .4s;cursor:pointer}
.cta-btn:hover{background:rgba(201,168,76,.17);border-color:rgba(201,168,76,.75);box-shadow:0 0 32px rgba(201,168,76,.18)}

/* SCROLL CUE */
.scroll-cue{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0;animation:fadeUp 1.2s 1.8s forwards}
.sc-line{width:1px;height:44px;background:linear-gradient(to bottom,var(--gold),transparent);animation:scPulse 1.6s ease-in-out infinite}
.sc-txt{font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);opacity:.6}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--black);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .9s ease}
#loader.hidden{opacity:0;pointer-events:none}
.ld-brand{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;letter-spacing:.22em;color:var(--ivory);text-transform:uppercase}
.ld-bar{width:180px;height:1px;background:rgba(255,255,255,.1);position:relative;overflow:hidden}
.ld-fill{position:absolute;left:0;top:0;bottom:0;width:0%;background:var(--gold);transition:width .08s linear}
.ld-pct{font-size:10px;letter-spacing:.2em;color:var(--gold);opacity:.75}

/* PLACEHOLDER NEXT SECTION */
.next{min-height:100vh;background:#0D0D0D;display:flex;align-items:center;justify-content:center}
.next p{font-family:'Cormorant Garamond',serif;font-size:28px;color:rgba(245,240,232,.15);font-style:italic;letter-spacing:.12em}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scPulse{0%,100%{opacity:1}50%{opacity:.25}}

@media(max-width:768px){nav{padding:18px 20px}.nav-links{display:none}}
</style>
</head>

const TOTAL = 210;
// Use thumbnail API - CORS friendly, no redirect issues
const GD = id => `https://drive.google.com/thumbnail?id=${id}&sz=w1280`;

// ── CANVAS SETUP ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const loader = document.getElementById('loader');
const lf = document.getElementById('lf');
const lp = document.getElementById('lp');

function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
resize();
window.addEventListener('resize',()=>{resize();drawFrame(cur)});

function drawFrame(n){
  const img=imgs[n];
  if(!img||!img.complete||!img.naturalWidth)return;
  const cw=canvas.width,ch=canvas.height;
  const scale=Math.max(cw/img.naturalWidth,ch/img.naturalHeight);
  const sw=img.naturalWidth*scale,sh=img.naturalHeight*scale;
  ctx.clearRect(0,0,cw,ch);
  ctx.drawImage(img,(cw-sw)/2,(ch-sh)/2,sw,sh);
}

// ── PRELOAD ──
const imgs = {};
let loaded=0, cur=1, ready=false;
const EAGER=30;
let eagerDone=0;

for(let i=1;i<=TOTAL;i++){
  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=()=>{
    loaded++;
    const pct=Math.round(loaded/TOTAL*100);
    lf.style.width=pct+'%';
    lp.textContent=pct+'%';
    if(i<=EAGER){
      eagerDone++;
      if(eagerDone===1)drawFrame(1);
      if(eagerDone>=EAGER&&!ready){
        ready=true;
        loader.classList.add('hidden');
        setTimeout(()=>loader.style.display='none',900);
      }
    }
  };
  img.onerror=()=>{loaded++};
  img.src=GD(IDS[i]);
  imgs[i]=img;
}

// ── SCROLL ──
const t1=document.getElementById('t1');
const t2=document.getElementById('t2');
const t3=document.getElementById('t3');
const t4=document.getElementById('t4');
const scue=document.querySelector('.scroll-cue');

function show(el,v){v?el.classList.add('on'):el.classList.remove('on')}

function tick(){
  if(!ready)return;
  const sec=document.getElementById('hero');
  const prog=Math.max(0,Math.min(1,-sec.getBoundingClientRect().top/(sec.offsetHeight-window.innerHeight)));
  const f=Math.max(1,Math.min(TOTAL,Math.round(prog*(TOTAL-1))+1));
  if(f!==cur){cur=f;drawFrame(f)}

  // text choreography mapped to 210 frames
  show(t1, f>=1  && f<=35);   // frames 1-35
  show(t2, f>=61 && f<=95);   // frames 61-95
  show(t3, f>=131&& f<=165);  // frames 131-165
  show(t4, f>=175);            // frames 175-210

  // fade scroll cue
  scue.style.opacity=prog<.04?'1':Math.max(0,1-prog*25).toString();
}

let raf=false;
window.addEventListener('scroll',()=>{if(!raf){requestAnimationFrame(()=>{tick();raf=false});raf=true}},{passive:true});
</script>
